{%load static %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>{%block title%}{%endblock%}</title>
  </head>
  <body>
    <header class="w-100 d-block position-sticky top-0 z-1">
      <div class="d-flex justify-content-between align-items-center">
        <div
          class="container-fluid d-flex justify-content-around align-items-center"
        >
          <div class="logo">
            <img
              src="/static/images/logo.png"
              alt="logo"
              class="object-fit-cover"
            />
          </div>
          <nav>
            <ul
              class="d-flex justify-content-center align-items-center gap-4 mt-4"
            >
              <li><a href="#">Accueil</a></li>
              <li><a href="#">Articles</a></li>
              <li><a href="#">Catégories</a></li>
              <li><a href="#">A propos</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </nav>
          {% if user.is_authenticated %}
          <div class="dropdown bg-light">
            <div tabindex="0" role="button" class="btn m-1">
              {{user.username}}
            </div>
            <ul
              tabindex="-1"
              class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
            >
              <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Déconnexion</button>
              </form>
            </ul>
          </div>
          {% else %}
          <div class="btn-connect">
            <a href="#" class="btn btn-primary">Connexion</a>
            <a href="{% url 'register' %}" class="btn btn-secondary"
              >Inscription</a
            >
          </div>

          {% endif %}
        </div>
      </div>
    </header>
    {%block content%} {%endblock%}
  </body>
</html>
